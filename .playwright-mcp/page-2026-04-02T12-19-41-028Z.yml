            - heading "E-Commerce" [level=3] [ref=e157]
            - paragraph [ref=e158]: Direct-to-consumer sales through leading Vietnamese e-commerce platforms. This channel enables national reach from day one, low-overhead distribution, and rich behavioral data to inform product development.
            - list [ref=e159]:
              - listitem [ref=e160]: — Shopee, Lazada, and direct website
