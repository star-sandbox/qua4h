        - heading "Where Customers Find Eco-Eye" [level=2] [ref=e149]
        - paragraph [ref=e150]: A three-channel distribution strategy ensures Eco-Eye reaches customers at multiple discovery touchpoints, with e-commerce as the primary and most scalable launch channel.
        - generic [ref=e151]:
