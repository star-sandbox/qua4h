        - heading "Problem, opportunity & reach" [level=1] [ref=e34]
        - paragraph [ref=e35]: Vietnam's households need real-time behavioral visibility. Eco-Eye addresses a structural gap between awareness and action — with a go-to-market plan built for scale.
    - region "The Problem We're Solving" [ref=e36]:
      - generic [ref=e37]:
        - generic [ref=e38]: Market Pain Points
        - heading "The Problem We're Solving" [level=2] [ref=e39]
        - paragraph [ref=e40]: Vietnam's demand for electricity and clean water is growing rapidly. Yet household resource consumption remains largely unmonitored, unmanaged, and disconnected from the country's broader climate commitments. Three systemic barriers stand in the way.
        - generic [ref=e41]:
          - generic [ref=e42]:
            - generic [ref=e43]: "01"
            - img [ref=e45]
            - heading "Invisible Waste" [level=3] [ref=e47]
            - paragraph [ref=e48]: Households consume energy and water without visibility into where the waste actually occurs. Without real-time feedback, inefficient behaviors persist unnoticed — lights left on, appliances left running, water flowing unnecessarily.
          - generic [ref=e49]:
            - generic [ref=e50]: "02"
            - img [ref=e52]
            - heading "Awareness Without Action" [level=3] [ref=e54]
            - paragraph [ref=e55]: Many households are aware of their environmental impact, yet still fail to change daily routines. Knowing is not enough — sustained behavior change requires consistent nudging, structured feedback loops, and positive reinforcement over time.
          - generic [ref=e56]:
            - generic [ref=e57]: "03"
            - img [ref=e59]
            - heading "No Carbon Feedback Loop" [level=3] [ref=e61]
            - paragraph [ref=e62]: People cannot visualize how their individual actions translate into CO₂ reductions. Without a direct, personal connection between daily behavior and climate impact, motivation to act sustainably remains abstract and short-lived.
        - note [ref=e63]:
          - img [ref=e65]
          - generic [ref=e67]:
            - heading "The Market Gap" [level=4] [ref=e68]
            - paragraph [ref=e69]:
              - text: "Vietnam faces increasing pressure to meet its climate commitments while managing surging household electricity and water demand. No existing consumer product in the Vietnamese market addresses the root cause: real-time behavioral visibility at the household level."
              - emphasis [ref=e70]: Supporting market statistics to be incorporated from research partners prior to investor presentation.
    - region "Why the Time Is Now" [ref=e71]:
      - generic [ref=e72]:
        - generic [ref=e73]: Market Opportunity
        - heading "Why the Time Is Now" [level=2] [ref=e74]
        - paragraph [ref=e75]: Three converging forces are creating an urgent and rapidly expanding market for household sustainability technology in Vietnam.
        - generic [ref=e76]:
          - generic [ref=e77]:
            - img [ref=e79]
            - heading "Surging Resource Demand" [level=3] [ref=e81]
            - paragraph [ref=e82]: Vietnam's rapid urbanization and economic growth are driving significant increases in household electricity and clean water consumption. Demand is rising faster than infrastructure and efficiency programs can offset, creating pressure at both the household and national level.
            - paragraph [ref=e83]: Supporting market data to be incorporated from research partners prior to investor presentation.
          - generic [ref=e84]:
            - img [ref=e86]
            - heading "Vietnam's Climate Commitments" [level=3] [ref=e88]
            - paragraph [ref=e89]: Vietnam has made formal climate pledges as part of its national development strategy, committing to measurable reductions in carbon emissions. These commitments create institutional momentum for sustainability solutions and growing consumer awareness of individual responsibility.
            - paragraph [ref=e90]: Supporting policy data to be incorporated from government and research sources.
          - generic [ref=e91]:
            - img [ref=e93]
            - heading "Rising Sustainability Consciousness" [level=3] [ref=e96]
            - paragraph [ref=e97]: A growing segment of Vietnamese consumers — particularly urban, middle-class households — are actively seeking tools that help them live more sustainably. Cost savings and environmental responsibility are converging as purchase motivators, creating ideal market conditions for Eco-Eye.
            - paragraph [ref=e98]: Consumer research data to be incorporated pending market study completion.
