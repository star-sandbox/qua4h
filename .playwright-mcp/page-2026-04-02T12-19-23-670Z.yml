        - heading "Solution, features & differentiation" [level=1] [ref=e34]
        - paragraph [ref=e35]: Eco-Eye is a behavior-change platform delivered as an AI camera and companion app — designed to make sustainability visible, actionable, and engaging for every household member.
    - region "An AI Eye That Watches Over Your Home" [ref=e36]:
      - generic [ref=e37]:
        - generic [ref=e38]: Our Solution
        - generic [ref=e39]:
          - generic [ref=e40]:
            - heading "An AI Eye That Watches Over Your Home" [level=2] [ref=e41]:
              - text: An AI Eye That Watches
              - text: Over Your Home
            - paragraph [ref=e42]: Eco-Eye is a smart camera system that understands your home environment, identifies wasteful behaviors as they occur, and guides your household toward more sustainable choices — one action at a time.
            - paragraph [ref=e43]: Unlike passive energy monitors that only report consumption after the fact, Eco-Eye acts in real time. Its AI engine observes household activity, identifies specific waste events — a light left on in an unoccupied room, a running tap, an appliance left idle — and immediately delivers a personalized recommendation through the companion app.
            - paragraph [ref=e44]: By displaying the CO₂ saved and energy conserved from each corrected behavior, Eco-Eye creates a tangible, motivating link between daily action and real-world environmental impact. Over time, this feedback loop drives lasting behavioral change at the household level.
            - link "See all features" [ref=e45] [cursor=pointer]:
              - /url: "#features"
          - generic [ref=e46]:
            - img [ref=e48]
            - generic [ref=e49]:
