        - heading "Built to Change Behavior, Not Just Track It" [level=2] [ref=e76]:
          - text: Built to Change Behavior,
          - text: Not Just Track It
        - paragraph [ref=e77]: Eco-Eye 2.0 ships with four core features that work together to deliver a complete behavior change platform for the modern household. Each feature is designed with long-term engagement in mind.
        - generic [ref=e78]:
          - article "Waste Detection AI" [ref=e79]:
            - img [ref=e81]
            - generic [ref=e84]: Core AI Engine
            - heading "Waste Detection AI" [level=3] [ref=e85]
            - paragraph [ref=e86]: The camera's computer vision engine identifies electricity waste, water waste, and over-running appliances in real time — requiring zero manual logging from the user. The system learns each home's usage patterns and improves accuracy over time.
            - generic [ref=e87]:
              - img [ref=e88]
              - text: Zero manual input required
          - article "Smart Suggestions" [ref=e90]:
            - img [ref=e92]
            - generic [ref=e94]: Intelligent Guidance
            - heading "Smart Suggestions" [level=3] [ref=e95]
            - paragraph [ref=e96]: When waste is detected, Eco-Eye delivers a timely, personalized recommendation through the companion app. Suggestions are calibrated to each user's individual behavior patterns, making them relevant, actionable, and welcomed rather than intrusive.
            - generic [ref=e97]:
              - img [ref=e98]
              - text: Personalized per household member
          - article "Eco Score System" [ref=e100]:
            - img [ref=e102]
            - generic [ref=e104]: Gamification Layer
            - heading "Eco Score System" [level=3] [ref=e105]
            - paragraph [ref=e106]: Every sustainable action earns points in a daily "green" scoring system. Households build streaks, unlock achievement levels, and track their ranking — creating sustained motivation that far outlasts any one-time awareness campaign.
            - generic [ref=e107]:
              - img [ref=e108]
              - text: Drives long-term engagement
          - article "Family Challenge Mode" [ref=e110]:
            - img [ref=e112]
            - generic [ref=e114]: Household Engagement
            - heading "Family Challenge Mode" [level=3] [ref=e115]
            - paragraph [ref=e116]: The entire household participates together. Family Challenge Mode introduces friendly competition between members, making sustainability a shared household goal rather than an individual obligation — and significantly strengthening product retention.
            - generic [ref=e117]:
              - img [ref=e118]
              - text: Increases household retention
