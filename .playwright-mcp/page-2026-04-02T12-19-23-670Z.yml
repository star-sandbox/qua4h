    - region "Three Reasons Eco-Eye Stands Apart" [ref=e165]:
      - generic [ref=e166]:
        - generic [ref=e167]: Why Eco-Eye
        - heading "Three Reasons Eco-Eye Stands Apart" [level=2] [ref=e168]:
          - text: Three Reasons Eco-Eye
          - text: Stands Apart
        - paragraph [ref=e169]: Generic smart home devices monitor energy use. Eco-Eye changes the way people relate to energy use. That distinction is our defensible competitive advantage.
        - generic [ref=e170]:
          - generic [ref=e171]:
            - generic [ref=e172]: "01"
            - img [ref=e174]
            - heading "A Truly Integrated Platform" [level=3] [ref=e177]
            - paragraph [ref=e178]: Eco-Eye combines hardware (AI camera), software (companion app), and behavioral science (gamification) into a single, seamless experience. Competing approaches are fragmented — requiring users to piece together separate monitors, apps, and dashboards. Eco-Eye delivers the complete platform out of the box.
          - generic [ref=e179]:
            - generic [ref=e180]: "02"
            - img [ref=e182]
            - heading "Context-Aware AI Intelligence" [level=3] [ref=e184]
            - paragraph [ref=e185]: "Eco-Eye is not merely an AI product — it is an intelligent AI agent that understands its surroundings. It does not simply measure kilowatts or detect heat. It recognizes specific behaviors in specific contexts: a television running in an empty room, a tap left on after handwashing. This contextual intelligence underpins the entire behavior-change capability."
          - generic [ref=e186]:
            - generic [ref=e187]: "03"
            - img [ref=e189]
            - heading "We Change Behavior, Not Just Data" [level=3] [ref=e191]
            - paragraph [ref=e192]: Passive monitoring tools tell you what happened. Eco-Eye tells you what to do differently — and makes you want to do it. Through eco scores, smart suggestions, and family challenges, Eco-Eye drives measurable, durable shifts in household behavior. That is the only outcome that produces real carbon reduction at scale.
