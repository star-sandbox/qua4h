          - text: Not Just Track It
        - paragraph [ref=e62]: Eco-Eye 2.0 ships with four core features that work together to deliver a complete behavior change platform for the modern household. Each feature is designed with long-term engagement in mind.
        - generic [ref=e63]:
          - article "Waste Detection AI" [ref=e64]:
            - img [ref=e66]
            - generic [ref=e69]: Core AI Engine
            - heading "Waste Detection AI" [level=3] [ref=e70]
            - paragraph [ref=e71]: The camera's computer vision engine identifies electricity waste, water waste, and over-running appliances in real time — requiring zero manual logging from the user. The system learns each home's usage patterns and improves accuracy over time.
            - generic [ref=e72]:
              - img [ref=e73]
              - text: Zero manual input required
          - article "Smart Suggestions" [ref=e75]:
            - img [ref=e77]
            - generic [ref=e79]: Intelligent Guidance
            - heading "Smart Suggestions" [level=3] [ref=e80]
            - paragraph [ref=e81]: When waste is detected, Eco-Eye delivers a timely, personalized recommendation through the companion app. Suggestions are calibrated to each user's individual behavior patterns, making them relevant, actionable, and welcomed rather than intrusive.
            - generic [ref=e82]:
              - img [ref=e83]
              - text: Personalized per household member
          - article "Eco Score System" [ref=e85]:
            - img [ref=e87]
            - generic [ref=e89]: Gamification Layer
            - heading "Eco Score System" [level=3] [ref=e90]
            - paragraph [ref=e91]: Every sustainable action earns points in a daily "green" scoring system. Households build streaks, unlock achievement levels, and track their ranking — creating sustained motivation that far outlasts any one-time awareness campaign.
            - generic [ref=e92]:
              - img [ref=e93]
              - text: Drives long-term engagement
          - article "Family Challenge Mode" [ref=e95]:
            - img [ref=e97]
            - generic [ref=e99]: Household Engagement
            - heading "Family Challenge Mode" [level=3] [ref=e100]
            - paragraph [ref=e101]: The entire household participates together. Family Challenge Mode introduces friendly competition between members, making sustainability a shared household goal rather than an individual obligation — and significantly strengthening product retention.
            - generic [ref=e102]:
              - img [ref=e103]
              - text: Increases household retention
