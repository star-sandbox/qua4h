    - region "Three Reasons Eco-Eye Stands Apart" [ref=e148]:
      - generic [ref=e149]:
        - generic [ref=e150]: Why Eco-Eye
        - heading "Three Reasons Eco-Eye Stands Apart" [level=2] [ref=e151]:
          - text: Three Reasons Eco-Eye
          - text: Stands Apart
        - paragraph [ref=e152]: Generic smart home devices monitor energy use. Eco-Eye changes the way people relate to energy use. That distinction is our defensible competitive advantage.
        - generic [ref=e153]:
          - generic [ref=e154]:
            - generic [ref=e155]: "01"
            - img [ref=e157]
            - heading "A Truly Integrated Platform" [level=3] [ref=e160]
            - paragraph [ref=e161]: Eco-Eye combines hardware (AI camera), software (companion app), and behavioral science (gamification) into a single, seamless experience. Competing approaches are fragmented — requiring users to piece together separate monitors, apps, and dashboards. Eco-Eye delivers the complete platform out of the box.
          - generic [ref=e162]:
            - generic [ref=e163]: "02"
            - img [ref=e165]
            - heading "Context-Aware AI Intelligence" [level=3] [ref=e167]
            - paragraph [ref=e168]: "Eco-Eye is not merely an AI product — it is an intelligent AI agent that understands its surroundings. It does not simply measure kilowatts or detect heat. It recognizes specific behaviors in specific contexts: a television running in an empty room, a tap left on after handwashing. This contextual intelligence underpins the entire behavior-change capability."
          - generic [ref=e169]:
            - generic [ref=e170]: "03"
            - img [ref=e172]
            - heading "We Change Behavior, Not Just Data" [level=3] [ref=e174]
            - paragraph [ref=e175]: Passive monitoring tools tell you what happened. Eco-Eye tells you what to do differently — and makes you want to do it. Through eco scores, smart suggestions, and family challenges, Eco-Eye drives measurable, durable shifts in household behavior. That is the only outcome that produces real carbon reduction at scale.
