              - text: An AI Eye That Watches
              - text: Over Your Home
            - paragraph [ref=e27]: Eco-Eye is a smart camera system that understands your home environment, identifies wasteful behaviors as they occur, and guides your household toward more sustainable choices — one action at a time.
            - paragraph [ref=e28]: Unlike passive energy monitors that only report consumption after the fact, Eco-Eye acts in real time. Its AI engine observes household activity, identifies specific waste events — a light left on in an unoccupied room, a running tap, an appliance left idle — and immediately delivers a personalized recommendation through the companion app.
            - paragraph [ref=e29]: By displaying the CO₂ saved and energy conserved from each corrected behavior, Eco-Eye creates a tangible, motivating link between daily action and real-world environmental impact. Over time, this feedback loop drives lasting behavioral change at the household level.
            - link "See all features" [ref=e30] [cursor=pointer]:
